app = "barberpro-frontend"

[build]
  dockerfile = "Dockerfile"
  args = {
    VITE_API_URL = "https://barberpro-api.fly.dev"
  }

[[services]]
  internal_port = 80
  protocol = "tcp"

  [[services.ports]]
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls"]
    port = 443
